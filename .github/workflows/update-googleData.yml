name: Update googleData.json

on:
  schedule:
    - cron: "0 */10 * * *" # co 10 min
    # - cron: "0 */1 * * *"    # co 1 godzin
    # - cron: "0 */12 * * *" # co 12 godzin
    # - cron: "0 0 * * *"      # co dziennie o północy
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-googleData:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Debug - Print API Key (Partial)
        run: |
          echo "API Key is set: ${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY != '' }}"

      - name: Run update-googleData.js
        env:
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}
        run: npm run update-googleData

      - name: Commit and Push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add public/googleData.json
          git commit -m "Automatyczna aktualizacja danych: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
